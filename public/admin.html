<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Экран ведущего · IT-Ребус Челлендж</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  body{overflow-x:hidden}
  .adm-top{display:flex;align-items:center;gap:16px;justify-content:space-between;
    max-width:1320px;margin:0 auto;padding:18px 24px}
  .adm-wrap{max-width:1320px;margin:0 auto;padding:10px 24px 40px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px}
  .kpi .v{font-family:"Sora";font-weight:800;font-size:44px;line-height:1}
  .kpi .l{color:var(--muted);font-size:14px;margin-top:6px}
  .kpi.online .v{color:var(--green)} .kpi.players .v{color:var(--cyan)}
  .kpi.points .v{color:var(--amber)} .kpi.ach .v{color:var(--violet)}
  .live-dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--green);
    box-shadow:0 0 12px var(--green);animation:blink 1.4s infinite}
  @keyframes blink{50%{opacity:.35}}
  .cols{display:grid;grid-template-columns:1.25fr 1fr;gap:18px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px}
  .panel h2{margin:0 0 14px;font-size:20px}
  .lb-row{display:grid;grid-template-columns:54px 1fr auto;align-items:center;gap:12px;
    padding:12px 14px;border-radius:14px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--line);
    transition:.4s}
  .lb-row .pos{font-family:"Sora";font-weight:800;font-size:22px;text-align:center}
  .lb-row .nm{font-weight:700;font-size:17px}
  .lb-row .nm small{color:var(--muted);font-weight:500;font-size:13px}
  .lb-row .pt{font-family:"Sora";font-weight:800;font-size:22px;color:var(--amber)}
  .lb-row.top1{background:linear-gradient(135deg,rgba(251,191,36,.18),var(--bg2));border-color:rgba(251,191,36,.5)}
  .lb-row.top2{border-color:rgba(205,211,234,.4)} .lb-row.top3{border-color:rgba(216,160,107,.5)}
  .stage-row{margin-bottom:14px}
  .stage-row .top{display:flex;justify-content:space-between;font-size:15px;margin-bottom:6px}
  .stage-row .top b{font-weight:700}
  .pbar{height:14px;border-radius:999px;background:var(--bg2);border:1px solid var(--line);overflow:hidden}
  .pbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));transition:.6s}
  .ticker{display:flex;flex-direction:column;gap:8px;max-height:330px;overflow:hidden}
  .tk{display:flex;gap:10px;align-items:center;background:var(--bg2);border:1px solid var(--line);
    border-radius:12px;padding:10px 12px;animation:pop .4s ease}
  .tk .e{font-size:22px}
  .tk .x{font-size:14px}
  .tk .x b{font-weight:700}
  .empty{color:var(--muted);text-align:center;padding:24px}
  @media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="adm-top">
  <div class="brand"><span class="dot"></span> Экран ведущего</div>
  <div class="row">
    <span class="pill"><span class="live-dot"></span> В эфире</span>
    <a class="btn sm ghost" href="/">← В приложение</a>
  </div>
</div>
<div class="adm-wrap" id="root">
  <div class="empty">Загрузка…</div>
</div>
<script src="/admin.js"></script>
</body>
</html>
